<!-- Logs  viewer page -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logs Viewer | Log Monitoring System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <header class="navbar">
        <div class="navbar-left">
            <h1>Log Monitoring System</h1>
            <span class="version">v1.0</span>
        </div>
        <div class="navbar-right">
            <span class="status-badge">● System Active</span>
        </div>
    </header>

    <!-- ================= MAIN LAYOUT ================= -->
    <div class="container">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar">
            <nav>
                <ul>
                    <li>
                        <a href="index.html">📊 Dashboard</a>
                    </li>
                    <li class="active">
                        <a href="logs.html">📄 Logs Viewer</a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- ===== CONTENT AREA ===== -->
        <main class="content">

            <!-- ===== PAGE HEADER ===== -->
            <section class="page-header">
                <h2>Logs Viewer</h2>
                <p>Filter, search and analyze system logs in real-time.</p>
            </section>

            <!-- ===== FILTER SECTION ===== -->
            <section class="filter-section">

                <div class="filter-group">
                    <label for="levelFilter">Level</label>
                    <select id="levelFilter">
                        <option value="">All</option>
                        <option value="INFO">INFO</option>
                        <option value="WARN">WARN</option>
                        <option value="ERROR">ERROR</option>
                        <option value="CRITICAL">CRITICAL</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="serviceFilter">Service</label>
                    <input type="text" id="serviceFilter" placeholder="e.g. auth-service">
                </div>

                <div class="filter-group">
                    <label for="startDate">Start Date</label>
                    <input type="datetime-local" id="startDate">
                </div>

                <div class="filter-group">
                    <label for="endDate">End Date</label>
                    <input type="datetime-local" id="endDate">
                </div>

                <div class="filter-group">
                    <button id="applyFiltersBtn" class="btn-primary">
                        Apply Filters
                    </button>
                </div>

            </section>

            <!-- ===== LOGS TABLE ===== -->
            <section class="table-section">

                <table class="logs-table">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Level</th>
                            <th>Service</th>
                            <th>Message</th>
                            <th>Response Time (ms)</th>
                        </tr>
                    </thead>
                    <tbody id="logsTableBody">
                        <!-- Logs will be injected via logs.js -->
                    </tbody>
                </table>

            </section>

            <!-- ===== PAGINATION ===== -->
            <section class="pagination-section">

                <button id="prevPageBtn" class="btn secondary">Previous</button>
                <span id="pageInfo">Page 1</span>
                <button id="nextPageBtn" class="btn secondary">Next</button>

            </section>

        </main>
    </div>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
        <p>Team 2 | FastAPI + MongoDB | Logs Viewer</p>
    </footer>

    <!-- ================= JS FILES ================= -->
    <script src="js/api.js"></script>
    <script src="js/logs.js"></script>

</body>
</html>
